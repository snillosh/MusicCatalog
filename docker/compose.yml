services:
  postgres:
    image: postgres:16
    container_name: musiccatalog-postgres
    environment:
      POSTGRES_USER: music
      POSTGRES_PASSWORD: music
      POSTGRES_DB: musiccatalog
    ports:
      - "5433:5432"
    volumes:
      - musiccatalog_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U music -d musiccatalog"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  musiccatalog_pgdata:
